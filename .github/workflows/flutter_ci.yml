name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Flutter platform folders
        run: |
          if [ ! -d android ]; then
            flutter create . --org com.glylens --project-name glylens --platforms android,ios
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Unit & widget tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --debug --dart-define=ENV=development

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug --dart-define=ENV=development

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: glylens-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
