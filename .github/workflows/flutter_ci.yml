name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Flutter platform folders
        run: |
          if [ ! -d android ]; then
            flutter create . --org com.glylens --project-name glylens --platforms android,ios
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Dart analyze
        run: dart analyze --fatal-infos lib test integration_test

      - name: Unit & widget tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --debug --dart-define=ENV=development

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug --dart-define=ENV=development

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: glylens-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  corpus-validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Validate seed JSON
        run: |
          docker build -t glylens-corpus-validator ./docker/corpus-validator
          docker run --rm -v "$PWD/docs/seed_data:/data/seed:ro" glylens-corpus-validator
