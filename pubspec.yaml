name: glylens
description: GlyLens — Food Intelligence for Better Decisions
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (ADR-approved; Constitution)
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Firebase Auth only (Build Program 1 — no Firestore)
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Localization
  intl: ^0.19.0

  # Offline cache — Hive for key-value foundation cache (no codegen).
  # Isar is recommended for structured corpus entities in Build Program 2 (see README).
  hive_flutter: ^1.1.0

  # Security
  flutter_secure_storage: ^9.2.4

  # Logging (no print)
  logger: ^2.5.0

  # Utilities
  equatable: ^2.0.7
  meta: ^1.15.0
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  test: ^1.25.8

flutter:
  uses-material-design: true
  generate: true
